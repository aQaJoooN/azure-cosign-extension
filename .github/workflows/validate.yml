name: Validate

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  validate:
    name: Validate Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          echo "Validating JSON files..."
          
          files=(
            "vss-extension.json"
            "azure-devops-extension.json"
            "service-endpoint/cosign-endpoint.json"
            "tasks/CosignSign/task.json"
            "tasks/CosignSign/package.json"
          )
          
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              if jq empty "$file" 2>/dev/null; then
                echo "✓ Valid: $file"
              else
                echo "❌ Invalid JSON: $file"
                exit 1
              fi
            else
              echo "⚠ Missing: $file"
            fi
          done

      - name: Validate shell scripts
        run: |
          echo "Validating shell scripts..."
          
          if [ -f "tasks/CosignSign/sign.sh" ]; then
            if bash -n tasks/CosignSign/sign.sh; then
              echo "✓ Valid: sign.sh"
            else
              echo "❌ Invalid syntax in sign.sh"
              exit 1
            fi
          fi
          
          if [ -f "build.sh" ]; then
            if bash -n build.sh; then
              echo "✓ Valid: build.sh"
            else
              echo "❌ Invalid syntax in build.sh"
              exit 1
            fi
          fi

      - name: Check for sensitive data
        run: |
          echo "Checking for potential secrets..."
          
          # Check for common secret patterns
          if grep -rE "(password|secret|token|key)\s*=\s*['\"][^'\"]{10,}['\"]" \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude="*.vsix" \
            --exclude="*.md" .; then
            echo "❌ Potential hardcoded secrets found!"
            exit 1
          fi
          
          echo "✓ No hardcoded secrets detected"

      - name: Validate required files
        run: |
          echo "Checking required files..."
          
          required_files=(
            "README.md"
            "LICENSE"
            "vss-extension.json"
            "service-endpoint/cosign-endpoint.json"
            "tasks/CosignSign/task.json"
            "tasks/CosignSign/sign.sh"
          )
          
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ Present: $file"
            else
              echo "❌ Missing required file: $file"
              exit 1
            fi
          done

      - name: Summary
        run: |
          echo "✅ All validation checks passed!"
